name: Build Drumo

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: drumo-windows
          - os: macos-latest        # Apple Silicon (M1+) runner
            artifact-name: drumo-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck renderer
        run: npx tsc -p tsconfig.json --noEmit

      - name: Build
        run: npm run build

      - name: Build central API
        run: npm run server:build

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ("v$version" -ne "${{ github.ref_name }}") { throw "Le tag ${{ github.ref_name }} ne correspond pas à package.json ($version)." }

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win nsis --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Generate secure update manifest
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $base = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          node scripts/generate-update-manifest.cjs $base

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac dmg --x64 --arm64 --publish never
        env:
          # Disable macOS code-signing in CI (unsigned builds still run via
          # right-click → Open on first launch). Add CSC_LINK + CSC_KEY_PASSWORD
          # secrets to your repo to enable signing.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Prevent electron-builder from trying to publish during the build step

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release/*.exe
          if-no-files-found: error
          retention-days: 7

      - name: Upload update manifest
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: drumo-update-manifest
          path: release/latest.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload macOS DMGs (x64 + arm64)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 7

  # ─── GitHub Release (tag pushes only) ────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: drumo-windows
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: drumo-macos
          path: dist/macos

      - name: Download update manifest
        uses: actions/download-artifact@v4
        with:
          name: drumo-update-manifest
          path: dist/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*.exe
            dist/windows/latest.json
            dist/macos/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
