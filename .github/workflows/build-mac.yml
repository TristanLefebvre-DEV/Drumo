name: Build macOS

on:
  workflow_dispatch:        # déclenchement manuel depuis l'onglet Actions
  push:
    tags:
      - "v*"               # ou automatique quand tu pousses un tag v1.0.0

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (renderer + electron)
        run: npm run build

      - name: Package macOS DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish never

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Drumo-mac
          path: release/*.dmg
          retention-days: 30

      # Si déclenché par un tag v* → crée automatiquement une GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          generate_release_notes: true
